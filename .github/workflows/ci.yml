name: CI Build & Lint

on:
  push:
    branches: [ main, ai-generate ]
  pull_request:
    branches: [ main, ai-generate ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Build project
        run: npm run build
